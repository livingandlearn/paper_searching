<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉语言文学选题智搜 - 关联检索版</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: "PingFang SC", sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #202124; }
        .container { max-width: 850px; margin: 20px auto; }
        
        /* 统计与提示区 */
        .hot-section { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #dfe1e5; }
        .hot-title { font-size: 14px; font-weight: bold; color: #5f6368; margin-bottom: 10px; }
        .hot-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .hot-tag { font-size: 12px; background: #f1f3f4; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
        .hot-tag:hover { background: #e8f0fe; color: var(--primary); }

        /* 关联提示 */
        .relation-tip { 
            background: #fff8e1; color: #f57f17; padding: 8px 15px; border-radius: 8px; 
            margin-bottom: 15px; font-size: 13px; display: none; border: 1px solid #ffe082;
        }

        /* 搜索框与分类 */
        .search-section { position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; }
        .search-bar { 
            background: white; display: flex; align-items: center; padding: 5px 20px; 
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #dfe1e5;
        }
        input { flex: 1; border: none; padding: 12px; font-size: 16px; outline: none; }
        
        .category-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .cat-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 14px; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .results-list { display: grid; gap: 10px; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #efefef; border-left: 4px solid #dadce0; }
        .card-title { font-size: 15px; font-weight: 500; color: #1a0dab; margin-bottom: 5px; }
        .year-badge { background: #e8f0fe; color: #1967d2; padding: 1px 6px; border-radius: 4px; font-size: 11px; }
        
        mark { background: #fff59d; color: black; padding: 0 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header" style="text-align: center; margin-bottom: 20px;">
        <h1 style="color:var(--primary)">汉语言文学选题智搜</h1>
        <p style="color:#666">支持作品-人物关联深度检索</p>
    </div>

    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索《红楼梦》会自动关联林黛玉、贾宝玉..." autofocus>
        </div>
    </div>

    <div id="relationTip" class="relation-tip"></div>

    <div class="hot-section">
        <div class="hot-title">🔥 选题高频引用 Top 20</div>
        <div class="hot-tags" id="hotTags"></div>
    </div>

    <div class="category-nav">
        <button class="cat-btn active" data-type="all">全部</button>
        <button class="cat-btn" data-type="literature">文学</button>
        <button class="cat-btn" data-type="language">语言</button>
        <button class="cat-btn" data-type="education">教学</button>
    </div>

    <div id="resultsList" class="results-list"></div>
</div>

<script>
    let database = [];
    let currentCategory = 'all';

    // 1. 核心优化：作品-人物关联映射表 (可根据需要持续扩充)
    const relationMap = {
        "红楼梦": ["林黛玉", "贾宝玉", "薛宝钗", "王熙凤", "刘姥姥", "大观园"],
        "西游记": ["孙悟空", "唐僧", "猪八戒", "沙和尚", "六小龄童"],
        "水浒传": ["宋江", "林冲", "武松", "鲁智深", "潘金莲", "李逵"],
        "三国演义": ["诸葛亮", "曹操", "刘备", "关羽", "张飞", "周瑜"],
        "金瓶梅": ["西门庆", "潘金莲", "李瓶儿", "庞春梅"],
        "雷雨": ["周朴园", "繁漪", "周萍", "鲁侍萍"],
        "骆驼祥子": ["祥子", "虎妞"],
        "阿Q正传": ["阿Q", "赵太爷"],
        "围城": ["方鸿渐", "孙柔嘉", "苏文纨"],
        "平凡的世界": ["孙少安", "孙少平", "田润叶"],
        "半生缘": ["沈世钧", "顾曼桢", "顾曼璐"],
        "边城": ["翠翠", "傩送", "天保"]
    };

    async function initDatabase() {
        try {
            const response = await fetch('database.json');
            database = await response.json();
            analyzeHotWorks();
            doSearch();
        } catch (err) { console.error("加载失败"); }
    }

    // 2. 增强搜索函数：关联检索逻辑
    function doSearch() {
        const inputRaw = document.getElementById('searchInput').value.trim();
        const keyword = inputRaw.toLowerCase();
        const tipEl = document.getElementById('relationTip');
        tipEl.style.display = 'none';

        if (!keyword) {
            renderResults(database.slice(0, 50), "");
            return;
        }

        // 查找关联词
        let searchTerms = [keyword];
        let matchedWork = "";

        // 情况A：搜作品名，关联角色
        for (let work in relationMap) {
            if (keyword.includes(work)) {
                searchTerms = searchTerms.concat(relationMap[work].map(v => v.toLowerCase()));
                matchedWork = work;
                tipEl.innerText = `💡 已自动关联《${work}》中的核心人物：${relationMap[work].join('、')}`;
                tipEl.style.display = 'block';
                break;
            }
        }

        // 情况B：搜角色名，关联作品
        if (!matchedWork) {
            for (let work in relationMap) {
                if (relationMap[work].some(role => keyword.includes(role.toLowerCase()))) {
                    searchTerms.push(work.toLowerCase());
                    tipEl.innerText = `💡 检测到人物角色，已自动关联所属作品：《${work}》`;
                    tipEl.style.display = 'block';
                    break;
                }
            }
        }

        // 执行多关键词过滤
        const filtered = database.filter(item => {
            const title = item[1].toLowerCase();
            const year = item[0].toLowerCase();
            return searchTerms.some(term => title.includes(term) || year.includes(term));
        });

        renderResults(filtered, keyword);
    }

    // 3. 高频词统计逻辑
    function analyzeHotWorks() {
        const counts = {};
        const bookRegex = /《([^》]+)》/g;
        database.forEach(item => {
            let match;
            while ((match = bookRegex.exec(item[1])) !== null) {
                const b = match[1]; if(b.length > 1) counts[b] = (counts[b] || 0) + 1;
            }
        });
        const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0, 20);
        document.getElementById('hotTags').innerHTML = sorted.map(([n, c]) => 
            `<div class="hot-tag" onclick="quickSearch('${n}')">${n}<b>${c}</b></div>`).join('');
    }

    function quickSearch(word) {
        document.getElementById('searchInput').value = word;
        doSearch();
    }

    function renderResults(data, keyword) {
        const list = document.getElementById('resultsList');
        if (data.length === 0) { list.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">未找到匹配选题</div>'; return; }
        
        list.innerHTML = data.slice(0, 300).map(item => `
            <div class="card">
                <div class="card-title">${keyword ? item[1].replace(new RegExp(`(${keyword})`, 'gi'), '<mark>$1</mark>') : item[1]}</div>
                <div style="font-size:12px;color:#888">
                    <span class="year-badge">${item[0]}</span> · 汉语言文学
                </div>
            </div>
        `).join('');
    }

    // 绑定事件
    document.getElementById('searchInput').addEventListener('input', doSearch);
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.type;
            doSearch();
        });
    });

    initDatabase();
</script>
</body>
</html>
