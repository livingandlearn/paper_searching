<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉语言文学选题智搜 - 安全版</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --accent: #34a853; }
        body { font-family: "PingFang SC", sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #202124; }
        .container { max-width: 900px; margin: 20px auto; }
        
        /* 统计与提示区 */
        .hot-section { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #dfe1e5; }
        .hot-title { font-size: 14px; font-weight: bold; color: #5f6368; margin-bottom: 10px; }
        .hot-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .hot-tag { font-size: 12px; background: #f1f3f4; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .hot-tag:hover { background: #e8f0fe; color: var(--primary); }
        .hot-tag b { color: var(--primary); margin-left: 4px; }

        /* 搜索框 */
        .search-section { position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; }
        .search-bar { 
            background: white; display: flex; align-items: center; padding: 5px 20px; 
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #dfe1e5;
        }
        input { flex: 1; border: none; padding: 12px; font-size: 16px; outline: none; }
        
        /* 分类导航 */
        .category-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .cat-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 14px; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* 结果展示 */
        .results-list { display: grid; gap: 12px; }
        .card { background: white; padding: 18px; border-radius: 12px; border: 1px solid #efefef; border-left: 5px solid #dadce0; }
        .card-title { font-size: 16px; font-weight: 500; color: #1a0dab; margin-bottom: 8px; }
        .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        .badge-main { background: #e8f0fe; color: #1967d2; }
        .badge-sub { background: #e6f4ea; color: #137333; }
        
        /* 默认占位提示 */
        .intro-screen { text-align: center; padding: 80px 20px; color: #70757a; border: 2px dashed #ddd; border-radius: 20px; margin-top: 20px; }
        .intro-screen i { display: block; font-size: 40px; margin-bottom: 10px; font-style: normal; }

        mark { background: #fff59d; color: black; padding: 0 1px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 25px;">
        <h1 style="color:var(--primary)">汉语言文学选题智搜</h1>
        <p style="color:#666">请输入关键词开始检索</p>
    </div>

    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索作家、作品、角色或题目..." autofocus>
        </div>
    </div>

    <div class="hot-section" id="hotSection" style="display: none;">
        <div class="hot-title">🔥 历届选题热点（点击直接搜索）</div>
        <div class="hot-tags" id="hotTags"></div>
    </div>

    <div class="category-nav">
        <button class="cat-btn active" data-type="all">全部</button>
        <button class="cat-btn" data-type="literature">文学</button>
        <button class="cat-btn" data-type="language">语言</button>
        <button class="cat-btn" data-type="education">教学</button>
    </div>

    <div id="resultsList" class="results-list">
        <div class="intro-screen">
            <i>🔍</i>
            <p>请在上方输入关键词后查看结果</p>
        </div>
    </div>
</div>

<script>
    let database = [];
    let currentCategory = 'all';

    // 二级分类规则
    const subCategoryRules = {
        literature: [
            { name: "古代文学", reg: /诗经|楚辞|唐诗|宋词|元曲|明清小说|红楼|苏轼|李白|杜甫/ },
            { name: "现当代文学", reg: /鲁迅|张爱玲|莫言|余华|沈从文|当代|现代|女性文学/ },
            { name: "外国文学", reg: /外国|西方|哈利波特|莎士比亚|对比|翻译/ },
            { name: "文学理论", reg: /叙事学|意象|审美|原型/ }
        ],
        language: [
            { name: "古代汉语", reg: /训诂|说文解字|古汉语|虚词/ },
            { name: "现代汉语", reg: /修辞|方言|语法|词汇|流行语|网络用语/ }
        ],
        education: [
            { name: "语文教学", reg: /中学|小学|语文|课堂|教材|部编本/ },
            { name: "对外汉语", reg: /对外汉语|文化传播/ }
        ]
    };

    const relationMap = {
        "红楼梦": ["林黛玉", "贾宝玉", "薛宝钗"],
        "边城": ["翠翠", "沈从文", "傩送"],
        "鲁迅": ["阿Q", "孔乙己", "祥林嫂"]
    };

    async function initDatabase() {
        try {
            const response = await fetch('database.json');
            database = await response.json();
            analyzeHotWorks();
            // 注意：这里移除了 init 时的 doSearch() 调用，保持页面初始为空
        } catch (err) { console.error("数据加载失败"); }
    }

    function getAutoTags(title) {
        let result = { main: "其他", sub: "综合" };
        if (/教学|语文|教材|学生/.test(title)) result.main = "教学";
        else if (/文化|民俗|媒介/.test(title)) result.main = "文化";
        else if (/词汇|语法|方言|修辞/.test(title)) result.main = "语言";
        else result.main = "文学";

        const categoryKey = { "文学": "literature", "语言": "language", "教学": "education", "文化": "culture" }[result.main];
        if (subCategoryRules[categoryKey]) {
            const matchedSub = subCategoryRules[categoryKey].find(s => s.reg.test(title));
            if (matchedSub) result.sub = matchedSub.name;
        }
        return result;
    }

    // 修改后的核心搜索函数
    function doSearch() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const list = document.getElementById('resultsList');

        // 【关键修改】：如果输入为空，清空列表并显示提示
        if (!query) {
            list.innerHTML = `
                <div class="intro-screen">
                    <i>🔍</i>
                    <p>为了保护数据库，请在上方输入关键词后查看结果</p>
                </div>`;
            return;
        }

        // 关联检索逻辑
        let searchKeywords = [query];
        for (let work in relationMap) {
            if (query.includes(work.toLowerCase()) || relationMap[work].some(r => query.includes(r.toLowerCase()))) {
                searchKeywords = [...new Set([...searchKeywords, work.toLowerCase(), ...relationMap[work].map(v=>v.toLowerCase())])];
            }
        }

        // 过滤逻辑
        let filtered = database.filter(item => {
            const title = item[1].toLowerCase();
            return searchKeywords.some(key => title.includes(key));
        });

        // 渲染结果
        if (filtered.length === 0) {
            list.innerHTML = '<div class="intro-screen"><i>😶</i><p>未找到匹配结果，请尝试其他词</p></div>';
        } else {
            list.innerHTML = filtered.slice(0, 300).map(item => {
                const tags = getAutoTags(item[1]);
                const highlightedTitle = item[1].replace(new RegExp(`(${query})`, 'gi'), '<mark>$1</mark>');
                return `
                    <div class="card">
                        <div class="card-title">${highlightedTitle}</div>
                        <div>
                            <span class="badge badge-main">${tags.main}</span>
                            <span class="badge badge-sub">${tags.sub}</span>
                            <span style="font-size:11px; color:#888;">· ${item[0]}</span>
                        </div>
                    </div>`;
            }).join('');
        }
    }

    function analyzeHotWorks() {
        const counts = {};
        const bookRegex = /《([^》]+)》/g;
        database.forEach(item => {
            let match;
            while ((match = bookRegex.exec(item[1])) !== null) {
                const b = match[1]; if(b.length > 1) counts[b] = (counts[b] || 0) + 1;
            }
        });
        const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0, 20);
        document.getElementById('hotTags').innerHTML = sorted.map(([n, c]) => 
            `<div class="hot-tag" onclick="quickSearch('${n}')">${n}<b>${c}</b></div>`).join('');
        document.getElementById('hotSection').style.display = 'block';
    }

    window.quickSearch = (w) => { document.getElementById('searchInput').value = w; doSearch(); };
    document.getElementById('searchInput').addEventListener('input', doSearch);

    initDatabase();
</script>
</body>
</html>
